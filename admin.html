<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Raghav Tour & Travels</title>

<style>
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:white;margin:0;padding:0;}
header{background:#ffcc00;color:#111;padding:15px;text-align:center;font-weight:bold;}
.container{max-width:1200px;margin:auto;padding:20px;}
h2{color:#ffcc00;margin-top:20px;}
section{background:rgba(255,255,255,0.05);padding:15px;margin-bottom:20px;border-radius:10px;}
input,textarea,button{padding:8px;margin:5px 0;border-radius:5px;border:none;}
button{background:#ffcc00;color:#111;font-weight:bold;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border-bottom:1px solid #555;}
</style>

</head>
<body>

<header>Raghav Tour & Travels | Admin Panel</header>

<div class="container">

<!-- LOGIN -->
<section id="loginSection">
<h2>Admin Login</h2>
<input type="email" id="adminEmail" placeholder="Email"><br>
<input type="password" id="adminPass" placeholder="Password"><br>
<button onclick="loginAdmin()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</section>

<!-- ROUTES -->
<section id="routesSection" style="display:none;">
<h2>Manage Routes</h2>
<input type="text" id="routeFrom" placeholder="From">
<input type="text" id="routeTo" placeholder="To">
<input type="number" id="routePrice" placeholder="Price">
<button onclick="addRoute()">Add Route</button>

<table id="routesTable">
<tr><th>From</th><th>To</th><th>Price</th><th>Action</th></tr>
</table>
</section>

<!-- BOOKINGS -->
<section id="bookingsSection" style="display:none;">
<h2>Bookings (Live)</h2>
<table id="bookingsTable">
<tr><th>Name</th><th>Phone</th><th>From</th><th>To</th><th>Date</th><th>Time</th><th>Pickup</th><th>Action</th></tr>
</table>
</section>

<!-- ABOUT -->
<section id="aboutSection" style="display:none;">
<h2>Edit About</h2>
<textarea id="aboutText" rows="5" style="width:100%;"></textarea>
<button onclick="updateAbout()">Save</button>
</section>

<!-- REVIEWS -->
<section id="reviewsSection" style="display:none;">
<h2>Reviews</h2>
<table id="reviewsTable">
<tr><th>Comment</th><th>Action</th></tr>
</table>
</section>

</div>

<script type="module">

// Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Config
const firebaseConfig = {
  apiKey: "AIzaSyD9bD9ijZK6WUkE7A9GyyiSnjLUozNXz7U",
  authDomain: "raghav-d9e01.firebaseapp.com",
  databaseURL: "https://raghav-d9e01-default-rtdb.firebaseio.com",
  projectId: "raghav-d9e01",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const rtdb = getDatabase();

// LOGIN
window.loginAdmin = function(){
  let email = adminEmail.value;
  let pass = adminPass.value;

  signInWithEmailAndPassword(auth,email,pass)
  .then(()=>{
    loginSection.style.display="none";
    showSections();
    loadRoutes();
    loadBookings();
    loadReviews();
  })
  .catch(e=>{
    loginMsg.innerText = e.message;
  });
}

// SHOW SECTIONS
function showSections(){
  ['routesSection','bookingsSection','aboutSection','reviewsSection'].forEach(id=>{
    document.getElementById(id).style.display='block';
  });
}

// ROUTES (Firestore)
window.addRoute = async function(){
  let from=routeFrom.value;
  let to=routeTo.value;
  let price=parseInt(routePrice.value);

  if(from && to && price){
    await addDoc(collection(db,"routes"),{from,to,price});
    loadRoutes();
    routeFrom.value=""; routeTo.value=""; routePrice.value="";
  }
}

async function loadRoutes(){
  let table=routesTable;
  table.innerHTML='<tr><th>From</th><th>To</th><th>Price</th><th>Action</th></tr>';

  let snap=await getDocs(collection(db,"routes"));
  snap.forEach(d=>{
    let row=table.insertRow();
    row.insertCell(0).innerText=d.data().from;
    row.insertCell(1).innerText=d.data().to;
    row.insertCell(2).innerText="₹"+d.data().price;

    let btn=document.createElement("button");
    btn.innerText="Delete";
    btn.onclick=()=>deleteDoc(doc(db,"routes",d.id)).then(loadRoutes);

    row.insertCell(3).appendChild(btn);
  });
}

// BOOKINGS (Realtime DB)
function loadBookings(){
  let table=bookingsTable;

  onValue(ref(rtdb,"bookings"),snap=>{
    table.innerHTML='<tr><th>Name</th><th>Phone</th><th>From</th><th>To</th><th>Date</th><th>Time</th><th>Pickup</th><th>Action</th></tr>';

    snap.forEach(child=>{
      let d=child.val();
      let key=child.key;

      let row=table.insertRow();
      row.insertCell(0).innerText=d.name;
      row.insertCell(1).innerText=d.phone;
      row.insertCell(2).innerText=d.from;
      row.insertCell(3).innerText=d.to;
      row.insertCell(4).innerText=d.date;
      row.insertCell(5).innerText=d.time;
      row.insertCell(6).innerText=d.pickup;

      let btn=document.createElement("button");
      btn.innerText="Delete";
      btn.onclick=()=>remove(ref(rtdb,"bookings/"+key));

      row.insertCell(7).appendChild(btn);
    });
  });
}

// ABOUT
window.updateAbout = async function(){
  await setDoc(doc(db,"content","about"),{text:aboutText.value});
}

// REVIEWS
async function loadReviews(){
  let table=reviewsTable;
  table.innerHTML='<tr><th>Comment</th><th>Action</th></tr>';

  let snap=await getDocs(collection(db,"reviews"));
  snap.forEach(d=>{
    let row=table.insertRow();
    row.insertCell(0).innerText=d.data().comment;

    let btn=document.createElement("button");
    btn.innerText="Delete";
    btn.onclick=()=>deleteDoc(doc(db,"reviews",d.id)).then(loadReviews);

    row.insertCell(1).appendChild(btn);
  });
}

</script>

</body>
</html>
